<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Configurações básicas -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Ícone da aba -->
    <link rel="icon" href="imgs/house-chimney.svg" type="image/svg+xml">

    <!-- Ícones Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Script -->
    <script defer src="script.js"></script>

    <title>Home</title>
</head>

<body>

    <!-- ============================= -->
    <!-- BOTÃO TROCAR WALLPAPER -->
    <!-- ============================= -->
    <button class="icon-button glass" id="change-wallpaper">
        <img class="icon" src="imgs/add-image.svg" alt="Alterar papel de parede">
    </button>

    <!-- Input oculto para selecionar imagem -->
    <input type="file" id="wallpaper-input" accept="image/*" hidden>


    <!-- ============================= -->
    <!-- MENU SUPERIOR DIREITO -->
    <!-- ============================= -->
    <div id="menu">

        <!-- Botão menu burger -->
        <button class="icon-button glass" id="configure">
            <img class="icon" src="imgs/menu-burger.svg" alt="Abrir menu">
        </button>

        <!-- Menu dropdown de configurações -->

        <div id="config-menu" class="hidden">
            <div id="config-menu-container" class="glass">

            <!-- ===== Toggle Favoritos ===== -->
            <div id="fav-switch">
                <label class="switch">
                    <input type="checkbox" id="favorite-switch">
                    <span class="slider glass"></span>
                </label>
                <p>Favoritos</p>
            </div>

            <!-- ===== Seletor de Motor de Busca ===== -->
            <div id="search-engine-container">

                <!-- Cabeçalho com botão e texto -->
                <div id="search-engine-header">
                    <button id="engine-button" class="engine-btn glass">
                        <img id="engine-icon" src="imgs/duckduckgo.svg" alt="Motor atual">
                    </button>
                    <span>Motor de busca</span>
                </div>

            </div>

            </div>

            <!-- Dropdown com opções -->
            <div id="engine-dropdown" class="hidden glass">

                <div class="engine-option" data-engine="duckduckgo">
                    <img src="imgs/duckduckgo.svg" alt="">
                    <span>DuckDuckGo</span>
                </div>

                <div class="engine-option" data-engine="google">
                    <img src="imgs/google.svg" alt="">
                    <span>Google</span>
                </div>

                <div class="engine-option" data-engine="bing">
                    <img src="imgs/bing.svg" alt="">
                    <span>Bing</span>
                </div>

                <div class="engine-option" data-engine="startpage">
                    <img src="imgs/startpage.svg" alt="">
                    <span>Startpage</span>
                </div>
            </div>

        </div>

    </div>


    <!-- ============================= -->
    <!-- CONTEÚDO CENTRAL -->
    <!-- ============================= -->
    <div id="center-container">

        <!-- Logo -->
        <img src="imgs/logo.svg" alt="Logo" id="logo">


        <!-- ===== Barra de Busca ===== -->
        <div class="search-box glass">
            <form action="https://duckduckgo.com/" method="GET" class="search-form">

                <input
                    type="text"
                    name="q"
                    class="input-box"
                    placeholder="Pesquise..."
                    autofocus
                >

                <button type="submit" class="search-btn">
                    <img src="imgs/search.svg" class="search-icon" alt="Buscar">
                </button>

            </form>
        </div>


        <!-- ============================= -->
        <!-- SEÇÃO DE FAVORITOS -->
        <!-- ============================= -->
        <div id="favorites-container">
            <div id="favorites-grid"></div>
        </div>

                <!-- Título -->
        <h1 style="color: rgba(233, 126, 126, 0.1);" class="kai">
            kai linde tesude gostose minhe rei
        </h1>


        <!-- ============================= -->
        <!-- MODAL DE FAVORITOS -->
        <!-- ============================= -->
        <div id="favorite-modal" class="modal">
            <div class="modal-content glass">

                <!-- Botão fechar -->
                <span class="close-modal">&times;</span>

                <h3 id="modal-title">Adicionar Favorito</h3>

                <!-- Inputs -->
                <input
                    type="text" 
                    id="favorite-name" 
                    placeholder="Nome do Site"
                >

                <input 
                    type="text" 
                    id="favorite-url" 
                    placeholder="URL (ex: https://exemplo.com)"
                >

                <!-- Botões -->
                <div class="modal-buttons">
                    <button id="save-favorite">Salvar</button>
                </div>

            </div>
        </div>

        <div id="edit-favorite-modal" class="modal">
            <div class="modal-content glass">
                <span class="close-modal" id="close-edit-modal">&times;</span>

                <h3>Editar Favorito</h3>

                <input type="text" id="edit-favorite-name" placeholder="Nome do site">
                <input type="url" id="edit-favorite-url" placeholder="https://exemplo.com">
            <input type="file" id="edit-favorite-icon-file" accept="image/*">

            <img id="edit-icon-preview" style="width:48px;height:48px;margin-top:10px;object-fit:contain;display:none;">

                <div class="modal-buttons">
                <button id="delete-favorite">Excluir</button>
                <button id="save-edit-favorite">Salvar</button>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
